<style>
    body {

<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface bg-background p-margin-mobile md:p-margin-desktop">
<!-- Main Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(33,67,41,0.05)] p-8 relative overflow-hidden">
<!-- Subtle gradient backdrop -->
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-primary-fixed/20 to-transparent -z-10"></div>
<!-- Header / Logo -->
<div class="text-center mb-8">
<h1 class="font-headline-xl md:font-headline-xl text-primary tracking-tight mb-2">WingsRiver</h1>
<p class="font-body-sm text-on-surface-variant">Restaurant Management Platform</p>
</div>
<!-- Google Login Button -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant rounded-lg py-3 px-4 font-body-md text-on-surface hover:bg-surface-container-low transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary-fixed-dim">
<!-- Simple SVG for Google 'G' -->
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
            Continue with Google
        </button>
<!-- Divider -->
<div class="flex items-center my-6">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="mx-4 font-label-caps text-outline uppercase tracking-wider">or</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Form -->
<form class="space-y-5" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col">
<label class="font-label-caps text-on-surface-variant uppercase mb-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full bg-[#F1F3F1] border-0 border-b border-outline-variant focus:border-primary focus:ring-0 rounded-t-sm py-3 pl-10 pr-4 font-body-md text-on-surface transition-colors" id="email" placeholder="manager@restaurant.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col">
<div class="flex justify-between items-center mb-1">
<label class="font-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<a class="font-label-caps text-primary hover:text-primary-container transition-colors uppercase" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-[#F1F3F1] border-0 border-b border-outline-variant focus:border-primary focus:ring-0 rounded-t-sm py-3 pl-10 pr-4 font-body-md text-on-surface transition-colors" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary font-body-lg md:font-body-lg rounded-lg py-3 px-4 hover:bg-primary transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary-fixed-dim focus:ring-offset-2 flex justify-center items-center gap-2 mt-6" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Footer -->
<div class="mt-8 text-center font-body-sm text-on-surface-variant">
            Don't have an account? <a class="text-primary font-medium hover:underline" href="#">Sign Up</a>
</div>
</main>
<script>
        // Minimal interaction for focus states on the custom input design
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.querySelector('.material-symbols-outlined').classList.add('text-primary');
                this.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-outline');
            });
            input.addEventListener('blur', function() {
                this.parentElement.querySelector('.material-symbols-outlined').classList.remove('text-primary');
                this.parentElement.querySelector('.material-symbols-outlined').classList.add('text-outline');
            });
        });
    </script>
